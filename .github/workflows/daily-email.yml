name: Daily Email

on:
  schedule:
    # Run once daily at 07:00 UTC
    - cron: "0 7 * * *"
  workflow_dispatch: # Allow manual trigger from Actions tab

permissions:
  contents: write

jobs:
  send:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch and process latest feeds
        run: python -m scripts.process_articles

      - name: Generate site (ensures fresh data for email links)
        run: python -m scripts.generate_site

      - name: Send daily email
        env:
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECEIVER: ${{ secrets.EMAIL_RECEIVER }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
        run: python -m scripts.send_email

      - name: Commit sent marker and updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ docs/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: daily email sent — $(date -u '+%Y-%m-%d')"
            git push
          fi
