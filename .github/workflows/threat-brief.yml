name: Threat Brief Daily Pipeline

on:
  schedule:
    # Run every 30 minutes. The Python scheduler decides whether to
    # actually execute based on the user's configured timezone and
    # the 07:00 local-time execution window.
    - cron: "*/30 * * * *"
  workflow_dispatch:
    inputs:
      force_run:
        description: "Force a full pipeline run (bypass time-window check)"
        required: false
        default: "false"
        type: boolean

permissions:
  contents: write

jobs:
  daily:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily pipeline
        env:
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECEIVER: ${{ secrets.EMAIL_RECEIVER }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          FORCE_RUN: ${{ inputs.force_run || 'false' }}
        run: python -m scripts.run_daily

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ docs/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: daily update — $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi
