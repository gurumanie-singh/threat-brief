name: Threat Brief Daily Email

on:
  schedule:
    # Run every 30 minutes. The Python scheduler decides whether to
    # actually send the email based on the user's configured timezone
    # and the 07:00 local-time execution window.
    - cron: "*/30 * * * *"
  workflow_dispatch:
    inputs:
      force_run:
        description: "Force email send (bypass time-window check)"
        required: false
        default: "false"
        type: boolean

permissions:
  contents: write

concurrency:
  group: threat-brief-pipeline
  cancel-in-progress: false

jobs:
  daily-email:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily email pipeline
        env:
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECEIVER: ${{ secrets.EMAIL_RECEIVER }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          FORCE_RUN: ${{ inputs.force_run || 'false' }}
        run: python -m scripts.run_daily

      - name: Commit state changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/state.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No state changes to commit"
          else
            git commit -m "chore: daily email state — $(date -u '+%Y-%m-%d %H:%M UTC')"
            git pull --rebase || true
            git push
          fi
