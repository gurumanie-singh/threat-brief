# ──────────────────────────────────────────────
# Personalization — highlight articles matching
# your environment. No accounts needed.
# ──────────────────────────────────────────────

personalization:
  # Articles matching these vendors get a highlight
  preferred_vendors: []
  # Articles matching these keywords get a highlight
  highlight_keywords: []
  # Minimum severity to include in email (critical, high, medium, low)
  email_min_severity: ""

# ──────────────────────────────────────────────
# Settings
# ──────────────────────────────────────────────

settings:
  max_article_age_days: 7
  max_articles_per_page: 50
  email_max_articles: 15
  site_title: Threat Brief
  site_description: Daily cybersecurity intelligence briefing
  # Set this to your GitHub Pages base URL after enabling Pages.
  # Example: https://yourusername.github.io/threat-brief
  site_base_url: ""
