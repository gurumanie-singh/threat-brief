# ──────────────────────────────────────────────
# Threat Brief — Configuration
# ──────────────────────────────────────────────

feeds:
  - name: The Hacker News
    url: https://feeds.feedburner.com/TheHackersNews
  - name: Krebs on Security
    url: https://krebsonsecurity.com/feed/
  - name: BleepingComputer
    url: https://www.bleepingcomputer.com/feed/
  - name: Dark Reading
    url: https://www.darkreading.com/rss.xml
  - name: Threatpost
    url: https://threatpost.com/feed/
  - name: CISA Alerts
    url: https://www.cisa.gov/cybersecurity-advisories/all.xml

# ──────────────────────────────────────────────
# Threat tags — articles are auto-tagged when
# the title or content contains these terms.
# ──────────────────────────────────────────────

tag_keywords:
  zero-day:
    - zero-day
    - zero day
    - 0-day
    - 0day
  ransomware:
    - ransomware
    - ransom
  malware:
    - malware
    - trojan
    - worm
    - backdoor
    - rootkit
    - spyware
    - adware
    - botnet
    - rat
    - infostealer
    - keylogger
  phishing:
    - phishing
    - spear-phishing
    - smishing
    - vishing
    - social engineering
  cve:
    - cve-
    - "cve "
  vulnerability:
    - vulnerability
    - vulnerabilities
    - rce
    - remote code execution
    - sql injection
    - xss
    - cross-site
    - buffer overflow
    - privilege escalation
  breach:
    - breach
    - data leak
    - data exposure
    - compromised
    - stolen data
  exploit:
    - exploit
    - proof of concept
    - poc
    - weaponized
  apt:
    - apt
    - advanced persistent threat
    - nation-state
    - state-sponsored
  patch:
    - patch
    - security update
    - hotfix
    - firmware update

