<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ site_title }} — Archive</title>
  <link rel="stylesheet" href="../assets/style.css">
</head>
<body>
  <header>
    <div class="container">
      <h1><span>⚡</span> {{ site_title }}</h1>
      <nav>
        <a href="../index.html">Latest</a>
        <a href="index.html">Archive</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <h2 class="day-heading">Archive</h2>

    {% if days %}
    <table class="archive-table">
      <thead>
        <tr>
          <th>Date</th>
          <th>Articles</th>
        </tr>
      </thead>
      <tbody>
        {% for entry in days %}
        <tr>
          <td><a href="../daily/{{ entry.day }}.html">{{ entry.day }}</a></td>
          <td>{{ entry.count }} article{{ "s" if entry.count != 1 else "" }}</td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
    {% else %}
    <p style="color: var(--text-muted); margin-top: 2rem;">No archived days yet.</p>
    {% endif %}
  </main>

  <footer>
    <div class="container">
      {{ site_title }} · auto-generated from public RSS feeds
    </div>
  </footer>
</body>
</html>
