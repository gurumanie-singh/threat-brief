<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}{{ site_title }}{% endblock %}</title>
  <meta name="description" content="{{ site_description }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ prefix }}assets/style.css">
</head>
<body>
  <nav class="site-nav">
    <a href="{{ prefix }}index.html" class="nav-logo">{{ site_title }}</a>
    <div class="nav-right">
      <a href="{{ prefix }}index.html" class="nav-link">Latest</a>
      <a href="{{ prefix }}archive/index.html" class="nav-link">Archive</a>
      <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme"></button>
    </div>
  </nav>

  <main>
    {% block content %}{% endblock %}
  </main>

  <footer class="site-footer">
    <a href="{{ prefix }}index.html" class="footer-logo">{{ site_title }}</a>
    <p class="footer-text">Auto-generated from public RSS feeds</p>
  </footer>

  <script src="{{ prefix }}assets/app.js"></script>
</body>
</html>
